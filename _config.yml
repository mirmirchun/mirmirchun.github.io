# Basic Site Settings
site_theme: "default"
title: "Miriam Chun, MSW"
title_separator: "-"
name: "Miriam Chun"
description: "Executive Director @ IRF | PhD Student @ GIST"
url: "https://mirmirchun.github.io"
baseurl: ""
repository: "mirmirchun/mirmirchun.github.io"

# Site Author
author:
  avatar: "profile.png"
  name: "Miriam Chun, MSW"
  pronouns: "she/her"
  bio: "AI Alignment and Global Rehabilitation Equity"
  location: "South Korea"
  employer: "Executive Director @ IRF | PhD Student @ GIST"
  uri: "https://rehabforum.org"
  email: "miriam.chun@gm.gist.ac.kr"
  github: "mirmirchun"
  linkedin: "msw-ai-change"

# Publication Categories
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

# Conversion & Markdown
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
